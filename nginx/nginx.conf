# ──────────────────────────────────────────────────────────────────────────────
#  Akademiya — Nginx 프로덕션 설정
#  위치: /etc/nginx/conf.d/default.conf  (Docker 내부)
# ──────────────────────────────────────────────────────────────────────────────

# ── 소셜 미디어 봇 감지 (OG 메타 프리뷰용) ──────────────────────────────────────
# ※ 인앱 브라우저 주의:
#   - 카카오톡 인앱: UA에 'KAKAOTALK' 포함  → kakaotalk-scrap 으로만 좁힘
#   - 인스타 인앱: UA에 'Instagram' 포함     → facebookexternalhit 이 실제 크롤러
#   - 페메 인앱: UA에 'FBAN/FBAV' 포함       → facebookexternalhit 이 실제 크롤러
#   위 세 앱의 인앱 브라우저가 봇으로 오판되면 OG 리다이렉트 무한 루프 발생!
map $http_user_agent $is_og_bot {
    default                     0;

    # ── 소셜 미디어 크롤러 ──────────────────────────────────────────────────────
    ~*facebookexternalhit       1;   # Facebook / Instagram 공식 크롤러
    ~*Facebot                   1;
    ~*Twitterbot                1;   # X (Twitter)
    ~*kakaotalk-scrap           1;   # 카카오톡 링크 미리보기 봇 (인앱 브라우저 제외)
    ~*WhatsApp                  1;   # WhatsApp
    ~*TelegramBot               1;   # Telegram
    ~*Discordbot                1;   # Discord
    ~*Slackbot                  1;   # Slack
    "~*Line/"                   1;   # LINE
    ~*LinkedInBot               1;   # LinkedIn
    ~*Naverbot                  1;   # 네이버

    # ── AI 에이전트 크롤러 ─────────────────────────────────────────────────────
    ~*GPTBot                    1;   # OpenAI 공식 크롤러
    ~*ChatGPT-User              1;   # ChatGPT 링크 브라우징
    ~*OAI-SearchBot             1;   # OpenAI 검색 봇
    ~*ClaudeBot                 1;   # Anthropic 공식 크롤러
    ~*Claude-User               1;   # Claude 링크 브라우징
    ~*anthropic-ai              1;   # Anthropic 크롤러 (구형)
    ~*Google-Extended           1;   # Google AI / Gemini 크롤러
    ~*Googlebot                 1;   # Googlebot (Gemini 포함)
    ~*PerplexityBot             1;   # Perplexity AI
    ~*bingbot                   1;   # Bing / Microsoft Copilot
    ~*msnbot                    1;   # Microsoft
    ~*Applebot                  1;   # Apple / Siri
    ~*Cohere-ai                 1;   # Cohere AI
}

# OG 리다이렉트 무한 루프 이중 방지: OG 페이지가 _bot_bypass=1 파라미터를 붙여 돌려보냄
map $arg__bot_bypass $skip_og_redirect {
    "1"     1;
    default 0;
}

# HTTP → HTTPS 리다이렉트 (akademiya.kr + gmc.akademiya.kr 모두)
server {
    listen 80;
    server_name akademiya.kr www.akademiya.kr gmc.akademiya.kr;
    return 301 https://$host$request_uri;
}

# HTTPS + SPA + API 프록시
server {
    listen 443 ssl http2;
    server_name akademiya.kr www.akademiya.kr;

    # ── SSL 인증서 (Let's Encrypt / 자체 서명)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── 보안 헤더
    add_header X-Frame-Options          "SAMEORIGIN"                always;
    add_header X-Content-Type-Options   "nosniff"                  always;
    add_header X-XSS-Protection         "1; mode=block"            always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── 정적 파일 루트 (Vite 빌드 결과)
    root /usr/share/nginx/html;
    index index.html;

    # ── 정적 에셋 캐싱 (파일명 해시 포함 → 장기 캐싱 안전)
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── API 요청 → 백엔드 컨테이너 프록시
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120s;
        # 파일 업로드 허용 크기 (multer 한도 100MB 기준 여유 확보)
        client_max_body_size 110m;
    }

    # ── 업로드 파일은 더 이상 공개 정적 서빙하지 않음 (H-2 저장형 XSS / M-4 접근 통제)
    #    인증·멤버십 검사 라우트 /api/files/:filename 으로만 제공 → 위 /api/ 프록시가 처리.

    # ── 공개 설문 공유 링크: 소셜 봇이면 OG HTML로, 일반 브라우저면 SPA로
    location ~ ^/surveys/public/([0-9]+)$ {
        # 봇 여부 결정 (bypass 파라미터가 있으면 무조건 SPA로)
        set $do_og_redirect 0;
        if ($is_og_bot)        { set $do_og_redirect 1; }
        if ($skip_og_redirect) { set $do_og_redirect 0; }
        if ($do_og_redirect = 1) {
            rewrite ^/surveys/public/([0-9]+)$ /api/surveys/og/$1 last;
        }
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── SPA fallback: 모든 경로를 index.html로
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}

# ──────────────────────────────────────────────────────────────────────────────
#  GMCAuto 서브도메인 (gmc.akademiya.kr)
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name gmc.akademiya.kr;

    # SSL 인증서 (akademiya.kr와 동일하게 사용하거나 gmc 전용 인증서 배치)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── 보안 헤더
    add_header X-Frame-Options          "SAMEORIGIN"                always;
    add_header X-Content-Type-Options   "nosniff"                  always;
    add_header X-XSS-Protection         "1; mode=block"            always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── GMCAuto Express 서버로 역방향 프록시
    #    (static 파일 포함, /api/* 포함 모두 gmcauto 컨테이너로 전달)
    location / {
        proxy_pass         http://gmcauto:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120s;

        # 정적 에셋 캐싱 힌트 (해시 파일명은 1년)
        proxy_cache_bypass $http_upgrade;
    }
}
