version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
#  Akademiya — Docker Compose 프로덕션 구성
#
#  사전 준비:
#    1. .env 파일 작성 (루트의 .env.example 참고)
#    2. backend/.env, gmc/.env 파일 작성
#    3. nginx/ssl/ 에 SSL 인증서 배치 (fullchain.pem, privkey.pem)
#    4. docker compose up -d --build
#
#  DB 마이그레이션 (최초 배포):
#    scripts/migrate-to-unified-mysql.sh 실행 후 컨테이너 시작
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL (통합 DB: akademiya) ────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      akademiya
      MYSQL_USER:          ${MYSQL_APP_USER}
      MYSQL_PASSWORD:      ${MYSQL_APP_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    networks:
      - akademiya_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Backend (Akademiya) ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      NODE_ENV:    production
      DB_HOST:     mysql
      DB_PORT:     "3306"
      DB_USER:     ${MYSQL_APP_USER}
      DB_PASSWORD: ${MYSQL_APP_PASSWORD}
      DB_NAME:     akademiya
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - akademiya_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── GMCAuto ────────────────────────────────────────────────────────────────
  gmcauto:
    build:
      context: ./gmc
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./gmc/.env
    environment:
      PORT:              "3001"
      NODE_ENV:          production
      TZ:                Asia/Seoul
      AKADEMIYA_API_URL: "http://backend:3000/api"
    volumes:
      - gmc_data:/app/data
    networks:
      - akademiya_net
    shm_size: '256m'
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e",
             "fetch('http://127.0.0.1:3001/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── AkashaAlt (ai.akademiya.kr) ───────────────────────────────────────────
  akashaalt:
    build:
      context: ./akashaalt-fe
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - akademiya_net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Frontend / Nginx ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
      gmcauto:
        condition: service_healthy
      akashaalt:
        condition: service_healthy
    networks:
      - akademiya_net

volumes:
  mysql_data:
  uploads_data:
  gmc_data:

networks:
  akademiya_net:
    driver: bridge
