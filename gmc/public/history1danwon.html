<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>외대부고 한국사 전근대사 킬러 50</title>
  <style>
    :root {
      --bg: #17130F;
      --card: #2A2119;
      --border: #5C4A37;
      --text: #EFE5D1;
      --title: #FFF1D2;
      --primary: #A63D2F;
      --primary-hover: #C34B3C;
      --success: #6FA57D;
      --wrong: #D0776D;
      --muted: #B8AA96;
      --shadow: 0 12px 30px rgba(0, 0, 0, .28);
      --header-height: 64px;
      --footer-height: 76px;
      color-scheme: dark;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.65;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,.34), transparent 24rem),
        linear-gradient(90deg, rgba(74,59,42,.035) 1px, transparent 1px),
        linear-gradient(0deg, rgba(74,59,42,.025) 1px, transparent 1px),
        var(--bg);
      background-size: auto, 18px 18px, 18px 18px, auto;
    }

    button, input, textarea, select {
      font: inherit;
      color: inherit;
    }

    button {
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      cursor: pointer;
      transition: transform .12s ease, background-color .12s ease, border-color .12s ease;
      touch-action: manipulation;
    }

    button:hover { border-color: var(--primary); }
    button:active { transform: translateY(1px); }
    button:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--primary) 34%, transparent);
      outline-offset: 2px;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 10;
      min-height: calc(var(--header-height) + env(safe-area-inset-top));
      padding: calc(10px + env(safe-area-inset-top)) 14px 10px;
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--bg) 90%, transparent);
      backdrop-filter: blur(12px);
    }

    .header-inner {
      display: flex;
      align-items: center;
      max-width: 1120px;
      margin: 0 auto;
    }

    h1 {
      margin: 0;
      color: var(--title);
      font-size: 1rem;
      line-height: 1.25;
    }

    .progress-wrap {
      max-width: 1120px;
      margin: 10px auto 0;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      font-size: .86rem;
      color: var(--muted);
    }

    .progress-track {
      height: 9px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: color-mix(in srgb, var(--card) 70%, var(--bg));
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: var(--primary);
      transition: width .2s ease;
    }

    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 16px 14px calc(var(--footer-height) + 26px + env(safe-area-inset-bottom));
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .quiz-layout {
      display: grid;
      gap: 14px;
    }

    .archive-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.22), transparent 42%),
        var(--card);
      box-shadow: var(--shadow);
    }

    .question-card { padding: 18px; }

    .question-kicker {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: .9rem;
    }

    .question-text {
      margin: 0 0 16px;
      color: var(--title);
      font-size: 1.08rem;
      font-weight: 750;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    .choices {
      display: grid;
      gap: 10px;
    }

    .choice {
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 10px;
      width: 100%;
      min-height: 54px;
      padding: 12px;
      text-align: left;
      background: color-mix(in srgb, var(--card) 88%, var(--bg));
    }

    .choice .mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--title);
      font-weight: 800;
    }

    .choice.selected {
      border-color: var(--primary);
      background: color-mix(in srgb, var(--primary) 10%, var(--card));
    }

    .choice.correct {
      border-color: var(--success);
      background: color-mix(in srgb, var(--success) 13%, var(--card));
    }

    .choice.wrong {
      border-color: var(--wrong);
      background: color-mix(in srgb, var(--wrong) 12%, var(--card));
    }

    .explanation {
      display: none;
      margin-top: 16px;
      padding: 14px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      white-space: pre-wrap;
      background: color-mix(in srgb, var(--bg) 52%, var(--card));
    }

    .explanation.visible { display: block; }

    .navigator {
      padding: 12px;
    }

    .navigator-title {
      margin: 0 0 10px;
      color: var(--title);
      font-size: .95rem;
      font-weight: 800;
    }

    .number-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
    }

    .number-grid button {
      min-height: 40px;
      padding: 0;
      font-size: .86rem;
    }

    .number-grid button.current {
      color: #fff;
      border-color: var(--primary);
      background: var(--primary);
    }

    .number-grid button.answered {
      border-color: color-mix(in srgb, var(--success) 60%, var(--border));
    }

    .footer-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 12;
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(12px);
    }

    .footer-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 720px;
      margin: 0 auto;
    }

    .primary-button {
      color: #fff;
      border-color: var(--primary);
      background: var(--primary);
      font-weight: 800;
    }

    .primary-button:hover { background: var(--primary-hover); }

    .ghost-button { background: transparent; }

    .result-panel {
      max-width: 760px;
      margin: 18px auto;
      padding: 22px;
    }

    .result-score {
      margin: 8px 0 14px;
      color: var(--title);
      font-size: 2.25rem;
      font-weight: 900;
      line-height: 1.1;
    }

    .result-actions {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    @media (min-width: 720px) {
      h1 { font-size: 1.15rem; }
      main { padding-top: 22px; }
      .quiz-layout { grid-template-columns: minmax(0, 1fr) 240px; align-items: start; }
      .navigator { position: sticky; top: calc(var(--header-height) + 18px); }
      .number-grid { grid-template-columns: repeat(4, 1fr); }
      .footer-inner { grid-template-columns: 160px 1fr 160px; }
    }

    @media (min-width: 1040px) {
      .quiz-layout { grid-template-columns: minmax(0, 760px) 260px; justify-content: center; }
      .question-card { padding: 24px; }
      .question-text { font-size: 1.16rem; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <h1 id="appTitle">외대부고 한국사 전근대사 킬러 50</h1>
    </div>
    <div class="progress-wrap" aria-live="polite">
      <div class="progress-track" aria-label="진행률"><div id="progressBar" class="progress-bar"></div></div>
      <span id="progressText">0 / 0</span>
    </div>
  </header>

  <main>
    <section id="quizScreen" class="screen active" aria-label="퀴즈">
      <div class="quiz-layout">
        <article class="archive-card question-card">
          <div class="question-kicker">
            <span id="questionNumber">문항 1</span>
            <button id="explanationButton" class="ghost-button" type="button">해설 보기</button>
          </div>
          <p id="questionText" class="question-text">문항을 불러오는 중입니다.</p>
          <div id="choices" class="choices"></div>
          <div id="explanation" class="explanation"></div>
        </article>
        <aside class="archive-card navigator" aria-label="문항 이동">
          <p class="navigator-title">문항 목록</p>
          <div id="numberGrid" class="number-grid"></div>
        </aside>
      </div>
    </section>

    <section id="resultScreen" class="screen" aria-label="결과">
      <div class="archive-card result-panel">
        <p class="question-kicker">채점 결과</p>
        <div id="resultScore" class="result-score">0 / 0</div>
        <p id="resultSummary"></p>
        <div class="result-actions">
          <button id="reviewButton" type="button">정답과 해설 보기</button>
          <button id="retryWrongButton" type="button">오답만 다시 풀기</button>
          <button id="restartButton" class="primary-button" type="button">시험 다시 시작</button>
        </div>
      </div>
    </section>
  </main>

  <nav class="footer-nav" aria-label="풀이 이동">
    <div class="footer-inner">
      <button id="previousButton" type="button">이전</button>
      <button id="submitButton" class="primary-button" type="button">마지막 채점</button>
      <button id="nextButton" type="button">다음</button>
    </div>
  </nav>

  <script>
    const STORAGE_KEYS = {
      progress: "hafs-history-danwon1-progress-v1"
    };

    const choiceLabels = ["①", "②", "③", "④", "⑤"];

    class QuizApp {
      constructor() {
        this.originalQuestions = [];
        this.questions = [];
        this.currentIndex = 0;
        this.answers = {};
        this.revealedQuestionIds = new Set();
        this.isSubmitted = false;
        this.reviewMode = false;
        this.elements = {
          title: document.getElementById("appTitle"),
          quizScreen: document.getElementById("quizScreen"),
          resultScreen: document.getElementById("resultScreen"),
          progressBar: document.getElementById("progressBar"),
          progressText: document.getElementById("progressText"),
          questionNumber: document.getElementById("questionNumber"),
          questionText: document.getElementById("questionText"),
          choices: document.getElementById("choices"),
          numberGrid: document.getElementById("numberGrid"),
          explanation: document.getElementById("explanation")
        };
        this.bindEvents();
      }

      bindEvents() {
        document.getElementById("previousButton").addEventListener("click", () => this.previous());
        document.getElementById("nextButton").addEventListener("click", () => this.next());
        document.getElementById("submitButton").addEventListener("click", () => this.submit());
        document.getElementById("explanationButton").addEventListener("click", () => this.showExplanation());
        document.getElementById("restartButton").addEventListener("click", () => this.restart());
        document.getElementById("retryWrongButton").addEventListener("click", () => this.retryWrongAnswers());
        document.getElementById("reviewButton").addEventListener("click", () => this.reviewAnswers());
      }

      async loadQuestions() {
        const response = await fetch("history1danwon.json", { cache: "no-store" });
        if (!response.ok) throw new Error("history1danwon.json을 불러오지 못했습니다.");
        const data = await response.json();
        this.elements.title.textContent = data.meta?.title || "한국사 퀴즈";
        this.originalQuestions = data.questions.map(question => structuredClone(question));
        this.loadProgress();
        this.renderQuestion();
      }

      shuffleQuestions() {
        this.questions = this.originalQuestions.map(question => structuredClone(question));
        for (let i = this.questions.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [this.questions[i], this.questions[j]] = [this.questions[j], this.questions[i]];
        }
      }

      renderQuestion() {
        if (!this.questions.length) return;
        const question = this.questions[this.currentIndex];
        const answeredCount = Object.keys(this.answers).length;
        const isRevealed = this.reviewMode || this.isSubmitted || this.revealedQuestionIds.has(question.id);
        this.elements.progressBar.style.width = `${(answeredCount / this.questions.length) * 100}%`;
        this.elements.progressText.textContent = `${answeredCount} / ${this.questions.length}`;
        this.elements.questionNumber.textContent = `문항 ${this.currentIndex + 1} / ${this.questions.length}`;
        this.elements.questionText.textContent = question.question;
        this.elements.choices.innerHTML = "";
        question.choices.forEach((choice, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "choice";
          button.setAttribute("aria-label", `${choiceLabels[index]} ${choice}`);
          button.innerHTML = `<span class="mark">${choiceLabels[index]}</span><span>${this.escapeHTML(choice)}</span>`;
          if (this.answers[question.id] === index) button.classList.add("selected");
          if (isRevealed) {
            if (index === question.answer) button.classList.add("correct");
            if (this.answers[question.id] === index && index !== question.answer) button.classList.add("wrong");
          }
          button.addEventListener("click", () => this.selectChoice(index));
          button.addEventListener("keydown", event => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              this.selectChoice(index);
            }
          });
          this.elements.choices.appendChild(button);
        });
        this.elements.explanation.textContent = question.explanation;
        this.elements.explanation.classList.toggle("visible", isRevealed);
        this.renderNumberGrid();
        this.saveProgress();
      }

      selectChoice(choiceIndex) {
        if (this.isSubmitted && !this.reviewMode) return;
        const question = this.questions[this.currentIndex];
        if (this.revealedQuestionIds.has(question.id) && !this.reviewMode) return;
        this.answers[question.id] = choiceIndex;
        this.revealedQuestionIds.add(question.id);
        this.renderQuestion();
      }

      next() {
        if (this.currentIndex < this.questions.length - 1) {
          this.currentIndex += 1;
          this.renderQuestion();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      }

      previous() {
        if (this.currentIndex > 0) {
          this.currentIndex -= 1;
          this.renderQuestion();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      }

      jumpTo(index) {
        this.currentIndex = Math.max(0, Math.min(index, this.questions.length - 1));
        this.renderQuestion();
      }

      submit() {
        this.isSubmitted = true;
        const score = this.questions.reduce((total, question) => total + (this.answers[question.id] === question.answer ? 1 : 0), 0);
        document.getElementById("resultScore").textContent = `${score} / ${this.questions.length}`;
        document.getElementById("resultSummary").textContent = `정답 ${score}문항, 오답 ${this.questions.length - score}문항입니다.`;
        this.elements.quizScreen.classList.remove("active");
        this.elements.resultScreen.classList.add("active");
        this.saveProgress();
      }

      showExplanation() {
        this.elements.explanation.classList.toggle("visible");
      }

      retryWrongAnswers() {
        const wrongQuestions = this.questions.filter(question => this.answers[question.id] !== question.answer);
        if (!wrongQuestions.length) {
          alert("다시 풀 오답이 없습니다.");
          return;
        }
        this.questions = wrongQuestions.map(question => structuredClone(question));
        this.answers = {};
        this.revealedQuestionIds = new Set();
        this.currentIndex = 0;
        this.isSubmitted = false;
        this.reviewMode = false;
        this.elements.resultScreen.classList.remove("active");
        this.elements.quizScreen.classList.add("active");
        this.renderQuestion();
      }

      reviewAnswers() {
        this.reviewMode = true;
        this.elements.resultScreen.classList.remove("active");
        this.elements.quizScreen.classList.add("active");
        this.currentIndex = 0;
        this.renderQuestion();
      }

      restart() {
        localStorage.removeItem(STORAGE_KEYS.progress);
        this.answers = {};
        this.revealedQuestionIds = new Set();
        this.currentIndex = 0;
        this.isSubmitted = false;
        this.reviewMode = false;
        this.shuffleQuestions();
        this.elements.resultScreen.classList.remove("active");
        this.elements.quizScreen.classList.add("active");
        this.renderQuestion();
      }

      saveProgress() {
        if (!this.questions.length) return;
        localStorage.setItem(STORAGE_KEYS.progress, JSON.stringify({
          questionIds: this.questions.map(question => question.id),
          currentIndex: this.currentIndex,
          answers: this.answers,
          revealedQuestionIds: [...this.revealedQuestionIds],
          isSubmitted: this.isSubmitted,
          reviewMode: this.reviewMode
        }));
      }

      loadProgress() {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEYS.progress) || "null");
        if (!saved?.questionIds?.length) {
          this.shuffleQuestions();
          return;
        }
        const questionMap = new Map(this.originalQuestions.map(question => [question.id, question]));
        this.questions = saved.questionIds.map(id => questionMap.get(id)).filter(Boolean).map(question => structuredClone(question));
        if (this.questions.length !== this.originalQuestions.length) this.shuffleQuestions();
        this.currentIndex = Math.min(saved.currentIndex || 0, this.questions.length - 1);
        this.answers = saved.answers || {};
        this.revealedQuestionIds = new Set(saved.revealedQuestionIds || []);
        this.isSubmitted = Boolean(saved.isSubmitted);
        this.reviewMode = Boolean(saved.reviewMode);
      }

      renderNumberGrid() {
        this.elements.numberGrid.innerHTML = "";
        this.questions.forEach((question, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = index + 1;
          button.setAttribute("aria-label", `${index + 1}번 문항으로 이동`);
          if (index === this.currentIndex) button.classList.add("current");
          if (this.answers[question.id] !== undefined) button.classList.add("answered");
          button.addEventListener("click", () => this.jumpTo(index));
          this.elements.numberGrid.appendChild(button);
        });
      }

      escapeHTML(value) {
        return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const quizApp = new QuizApp();
      window.quizApp = quizApp;
      try {
        await quizApp.loadQuestions();
      } catch (error) {
        document.getElementById("questionText").textContent = `${error.message} 로컬 파일로 직접 열었다면 간단한 웹 서버에서 실행하세요.`;
      }
    });
  </script>
</body>
</html>
